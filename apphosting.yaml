runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80

scripts:
  buildCommand: pnpm --filter @flowdesk/shared build && pnpm --filter @flowdesk/firebase build && pnpm --filter @flowdesk/web build
  runCommand: pnpm --filter @flowdesk/web start

env:
  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
