# FlowDesk API — flowdesk.victorsouza.dev (ou seu domínio)
# Repassa TODO o backend Hono, não só /health.
#
# Instalação na VM:
#   sudo cp flowdesk-api.conf /etc/nginx/sites-available/flowdesk-api.conf
#   sudo ln -sf /etc/nginx/sites-available/flowdesk-api.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ajuste BACKEND_PORT se o Docker publicar outra porta (padrão compose: 9031).

upstream flowdesk_backend {
    server 127.0.0.1:9031;
    keepalive 16;
}

server {
    listen 80;
    server_name flowdesk.victorsouza.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flowdesk.victorsouza.dev;

    # Certbot / Let's Encrypt (ajuste os paths)
    # ssl_certificate     /etc/letsencrypt/live/flowdesk.victorsouza.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/flowdesk.victorsouza.dev/privkey.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://flowdesk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
