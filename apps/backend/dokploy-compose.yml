services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    restart: unless-stopped
    ports:
      - "9031:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      ENABLE_WORKERS: "true"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  backend-data:
