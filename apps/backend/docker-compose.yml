x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    platform: linux/arm64
    container_name: flowdesk-backend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${PORT:-9031}:9031"
    env_file:
      - apps/.env
    environment:
      NODE_ENV: production
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9031/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  backend-data:
