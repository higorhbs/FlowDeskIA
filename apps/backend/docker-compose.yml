x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowdesk-backend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${HOST_PORT:-9031}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  backend-data:
