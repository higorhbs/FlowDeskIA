x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    mem_limit: "256m"
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    init: true
    logging: *default-logging
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      ENABLE_WORKERS: ${ENABLE_WORKERS:-true}
      CORS_ORIGIN: ${CORS_ORIGIN}
      WEB_ORIGIN: ${WEB_ORIGIN:-}
      REDIS_URL: redis://redis:6379
      WA_SESSION_PATH: /app/sessions
      WA_API_PUBLIC_URL: ${WA_API_PUBLIC_URL:-http://localhost:3001}
      INTERNAL_NOTIFY_SECRET: ${INTERNAL_NOTIFY_SECRET:-}
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    volumes:
      - wa_sessions:/app/sessions
      - wa_chat_media:/app/chat-media
      - wa_status_media:/app/status-media
      - ./.secrets:/app/.secrets:ro
    mem_limit: "768m"
    cpus: "1.5"

volumes:
  redis_data:
  wa_sessions:
  wa_chat_media:
  wa_status_media:
